name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  version:
    name: Bump version & tag
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: bump
        run: |
          NEW_TAG=$(npm version patch -m "chore: release %s [skip ci]")
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Push version bump and tag
        run: |
          git push origin main
          git push origin --tags

  build:
    name: Build (${{ matrix.platform }})
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            # Explicitly list targets so electron-builder v24 doesn't add snap
            targets: AppImage deb
          - os: windows-latest
            platform: win
            targets: ''
          - os: macos-latest
            platform: mac
            targets: ''

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.new_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/AppData/Local/electron/Cache
            ~/Library/Caches/electron
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package & publish
        # Targets are explicit for Linux; empty string is fine for mac/win (uses config)
        run: npx electron-builder --${{ matrix.platform }} ${{ matrix.targets }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable cert auto-discovery — do NOT pass CSC_LINK or WIN_CSC_LINK unless
          # you have actual signing certs; an empty secret resolves to "" which
          # electron-builder treats as a cert path pointing to the working directory.
          CSC_IDENTITY_AUTO_DISCOVERY: false

  publish:
    name: Publish release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as public
        run: gh release edit ${{ needs.version.outputs.new_tag }} --draft=false --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
